# Отдельный инстанс lighttpd под веб-панель. Порт 8088.
# Доступ ограничивается на уровне firewall (только LAN), см. install-panel.sh.
server.modules = ("mod_cgi")
server.document-root = "/opt/share/www/vpn-panel"
server.port = 8088
server.bind = "0.0.0.0"
server.errorlog = "/opt/var/log/lighttpd-panel.err"
server.pid-file = "/opt/var/run/lighttpd-panel.pid"
index-file.names = ("index.html")
mimetype.assign = (
  ".html" => "text/html; charset=utf-8",
  ".js"   => "application/javascript",
  ".css"  => "text/css"
)
# CGI только в /cgi-bin/, скрипты исполняются по шебангу
$HTTP["url"] =~ "^/cgi-bin/" {
  cgi.assign = ( ".sh" => "" )
}
